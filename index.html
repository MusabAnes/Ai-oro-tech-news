   am:`<h3 style="color:#f1f5f9;margin-bottom:10px">💻 AI Coding Tools 2026</h3><p style="color:#94a3b8">Cursor ደረጃ 1ኛ ነው። Google AI Studio ሙሉ ለሙሉ ነፃ ነው። GitHub Copilot ለተማሪዎች ነፃ ነው።</p>`},
   url:"https://cursor.sh"},
];

// ═══════════════════════════
// STATE
// ═══════════════════════════
let lang="om", tab="news", sq="", sv=[], spkId=null;
try{sv=JSON.parse(localStorage.getItem("aoro_v3")||"[]");}catch{}

const TAB_DATA={news:NEWS_DATA, models:MODELS_DATA, voice:VOICE_DATA, video:VIDEO_DATA, image:IMAGE_DATA, code:CODE_DATA};
const TABS=[
  {id:"news",key:"news"},{id:"models",key:"models"},{id:"voice",key:"voice"},
  {id:"video",key:"video"},{id:"image",key:"image"},{id:"code",key:"code"},
  {id:"saved",key:"saved"},{id:"settings",key:"settings"}
];

// ═══════════════════════════
// INIT
// ═══════════════════════════
function init(){buildLang();buildNav();showTab("news");}

function buildLang(){
  document.getElementById("lbar").innerHTML=LANGS.map(l=>
    `<button class="lbtn ${l.code===lang?"on":""}" onclick="setLang('${l.code}')">${l.label}</button>`
  ).join("");
}

function t(key){return (TR[lang]||TR.en)[key]||key;}

function setLang(c){lang=c;document.body.classList.toggle("rtl",c==="ar");buildLang();buildNav();if(tab==="settings")renderSettings();else render();}

function buildNav(){
  document.getElementById("navbar").innerHTML=TABS.map(tb=>{
    const label = t(tb.key) || tb.id;
    return `<button class="nbtn ${tb.id===tab?"on":""}" onclick="showTab('${tb.id}')">${label}</button>`;
  }).join("");
}

function showTab(tb){
  tab=tb;sq="";
  const si=document.getElementById("sinp");if(si)si.value="";
  const xb=document.getElementById("xbtn");if(xb)xb.style.display="none";
  buildNav();
  const showSearch=["news","models","voice","video","image","code","saved"].includes(tb);
  document.getElementById("search-wrap").style.display=showSearch?"block":"none";
  if(tb==="settings")renderSettings();
  else render();
}

// ═══════════════════════════
// RENDER
// ═══════════════════════════
function render(){
  const grid=document.getElementById("grid");
  const empty=document.getElementById("empty");
  let data=tab==="saved"?sv:(TAB_DATA[tab]||[]);
  if(sq){const q=sq.toLowerCase();data=data.filter(d=>{const ti=getT(d.title);const su=getT(d.summary);return ti.toLowerCase().includes(q)||su.toLowerCase().includes(q);});}
  if(!data.length){grid.innerHTML="";empty.style.display="block";document.getElementById("emsg").textContent=tab==="saved"?t("noSaved"):t("noResult");return;}
  empty.style.display="none";
  grid.innerHTML=data.map((d,i)=>{
    const isSv=sv.find(x=>x.id===d.id);const isSpk=spkId===d.id;
    return`<div class="card" style="animation-delay:${Math.min(i,6)*.06}s" onclick="openDetail('${d.id}')">
      <div class="cthumb" style="background:${thumbBg(d.icon)}">${d.icon}</div>
      <div class="cbody">
        <div class="cmeta">
          <span class="badge ${d.impact}">${impE(d.impact)}</span>
          <span class="msrc">📰 ${esc(d.source)}</span>
          <span class="mdate">📅 ${d.date}</span>
        </div>
        <h3 class="ctitle">${esc(getT(d.title))}</h3>
        <p class="csum">${esc(getT(d.summary).slice(0,140))}...</p>
        <div class="cacts" onclick="event.stopPropagation()">
          <button class="abtn ${isSpk?"spk":""}" onclick="spk('${d.id}','${escA(getT(d.title)+'. '+getT(d.summary))}')">${isSpk?t("stop"):t("listen")}</button>
          <button class="abtn ${isSv?"svd":""}" onclick="toggleSv('${d.id}')">${isSv?t("saved_btn"):t("save")}</button>
          ${d.url?`<a class="rlink" href="${escA(d.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${t("tryIt")}</a>`:""}
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderSettings(){
  document.getElementById("grid").innerHTML=`
  <div style="padding:4px 0">
    <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px">🌍 ${lang==="om"?"Afaan Filadhu":lang==="am"?"ቋንቋ ምረጥ":lang==="en"?"Select Language":"Language"}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${LANGS.map(l=>`<button class="lbtn ${l.code===lang?"on":""}" onclick="setLang('${l.code}');renderSettings()">${l.label}</button>`).join("")}</div>
    </div>
    <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px">📊 ${lang==="om"?"Waa'ee App":lang==="am"?"ስለ App":"About App"}</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.9">
        📅 ${lang==="om"?"Haaromfame":"Updated"}: June 10, 2026<br>
        🤖 AI Models: ${MODELS_DATA.length} items<br>
        🔊 ${t("voice")}: ${VOICE_DATA.length} items<br>
        🎬 ${t("video")}: ${VIDEO_DATA.length} items<br>
        🖼️ ${t("image")}: ${IMAGE_DATA.length} items<br>
        💻 ${t("code")}: ${CODE_DATA.length} items<br>
        🔖 ${t("saved")}: ${sv.length} items
      </div>
    </div>
    <div class="cbox">
      <div style="font-size:42px;margin-bottom:10px">👨‍💻</div>
      <div style="font-size:22px;font-weight:800;color:#f1f5f9;font-family:'Syne',sans-serif">Musab Anes</div>
      <div style="font-size:13px;color:var(--accent);margin-top:4px">${lang==="om"?"Uumaa fi Abbaa":lang==="am"?"ፈጣሪ":"Creator & Owner"} — Ai Oro Tech News</div>
      <div style="font-size:12px;color:var(--dim);margin-top:10px;line-height:1.7">
        ${lang==="om"?"App kana Musab Anes uume — Afaan Oromoo fi Ethiopia keessatti AI odeeffannoo namootaaf kennuuf.":lang==="am"?"ይህ app Musab Anes ፈጥሯል — ለኢትዮጵያ ሕዝቦች AI መረጃ ለማቅረብ።":"This app was created by Musab Anes to bring AI knowledge to Oromo and Ethiopian communities."}<br><br>
        🧠 Powered by Claude AI · Anthropic<br>
        ☁️ Deployed on Cloudflare Workers<br>
        📅 Version 3.0 — June 2026
      </div>
    </div>
    <div style="margin-top:12px;text-align:center">
      <button onclick="sv=[];try{localStorage.removeItem('aoro_v3');}catch{}buildNav();render();showTab('news')" style="background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:#ff6b7a;padding:8px 16px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:12px">
        🗑️ ${lang==="om"?"Kuusamee Hunda Haqi":lang==="am"?"ሁሉንም ሰርዝ":"Clear All Saved"}
      </button>
    </div>
  </div>`;
  document.getElementById("empty").style.display="none";
}

// ═══════════════════════════
// DETAIL MODAL
// ═══════════════════════════
function openDetail(id){
  const all=[...NEWS_DATA,...MODELS_DATA,...VOICE_DATA,...VIDEO_DATA,...IMAGE_DATA,...CODE_DATA,...sv];
  const d=all.find(x=>x.id===id);if(!d)return;
  const det=d.detail?getT(d.detail):esc(getT(d.summary));
  document.getElementById("mcontent").innerHTML=`
    <div style="text-align:center;font-size:44px;margin-bottom:12px">${d.icon}</div>
    <div class="mtitle">${esc(getT(d.title))}</div>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      <span class="badge ${d.impact}">${impE(d.impact)}</span>
      <span class="msrc">📰 ${esc(d.source)}</span>
      <span class="mdate">📅 ${d.date}</span>
    </div>
    <div class="mbody">${det}</div>
    ${d.url?`<a class="mlink" href="${escA(d.url)}" target="_blank" rel="noopener">${t("tryIt")}</a>`:""}
  `;
  document.getElementById("mbg").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeMod(e){if(e.target===document.getElementById("mbg"))closeModD();}
function closeModD(){document.getElementById("mbg").classList.remove("open");document.body.style.overflow="";}

// ═══════════════════════════
// ACTIONS
// ═══════════════════════════
function getT(obj){if(!obj)return"";if(typeof obj==="string")return obj;return obj[lang]||obj.en||obj.om||Object.values(obj)[0]||"";}
function doSearch(){sq=document.getElementById("sinp").value.trim();document.getElementById("xbtn").style.display=sq?"inline-block":"none";render();}
function clearSearch(){sq="";document.getElementById("sinp").value="";document.getElementById("xbtn").style.display="none";render();}
function toggleSv(id){
  const all=[...NEWS_DATA,...MODELS_DATA,...VOICE_DATA,...VIDEO_DATA,...IMAGE_DATA,...CODE_DATA];
  const d=all.find(x=>x.id===id);if(!d)return;
  const idx=sv.findIndex(x=>x.id===id);
  if(idx>=0)sv.splice(idx,1);else sv.unshift(d);
  try{localStorage.setItem("aoro_v3",JSON.stringify(sv));}catch{}
  buildNav();render();
}
function spk(id,text){
  window.speechSynthesis.cancel();
  if(spkId===id){spkId=null;render();return;}
  const u=new SpeechSynthesisUtterance(text);
  const vs=window.speechSynthesis.getVoices();
  const lm={om:"en",am:"am",ti:"ti",so:"so",ar:"ar",en:"en"};
  const v=vs.find(x=>x.lang.startsWith(lm[lang]||"en"))||vs[0];
  if(v)u.voice=v;u.rate=0.88;
  u.onend=u.onerror=()=>{spkId=null;render();};
  window.speechSynthesis.speak(u);spkId=id;render();
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escA(s){return(s||"").replace(/'/g,"&#39;").replace(/\n/g," ").slice(0,200);}
function impE(i){return{high:"🔥 HIGH",medium:"⚡ MED",low:"✅ LOW"}[i]||"📌";}
function thumbBg(icon){const m={"🏗️":"linear-gradient(135deg,#0f172a,#1e3a5f)","📺":"linear-gradient(135deg,#1a0000,#3a0010)","🔊":"linear-gradient(135deg,#0a1e0a,#0a3020)","🎬":"linear-gradient(135deg,#0a0a1e,#1a0a3e)","🖼️":"linear-gradient(135deg,#0a1e10,#0a2e1a)","💻":"linear-gradient(135deg,#0f1923,#1a2e3a)","🤖":"linear-gradient(135deg,#1e0a3e,#0a1e3e)"};return m[icon]||"linear-gradient(135deg,#06060f,#0d1117)";}
window.onload=init;
</script>
</body>
</html>
