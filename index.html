<style>
:root{--bg:#06060f;--bg2:#0d1117;--purple:#7c3aed;--blue:#2563eb;--accent:#a78bfa;--text:#e2e8f0;--muted:#94a3b8;--dim:#6b7280;--card:rgba(255,255,255,.035);--border:rgba(255,255,255,.08);}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 55%,#0a0a1e 100%);font-family:'DM Sans','Syne',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
body.rtl{direction:rtl;font-family:'Cairo',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px}
header{background:rgba(6,6,16,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(124,58,237,.2);position:sticky;top:0;z-index:60;padding:0 14px}
.hi{max-width:900px;margin:0 auto}
.hr1{display:flex;align-items:center;justify-content:space-between;height:52px;gap:8px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer}
.li{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px}
.ln{font-family:'Syne',sans-serif;font-weight:800;font-size:13px}
.ls{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:#22c55e}
.lscroll{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.lscroll::-webkit-scrollbar{display:none}
.lbtn{white-space:nowrap;padding:3px 9px;border-radius:20px;font-size:11px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.05);color:var(--dim);cursor:pointer;font-family:inherit;transition:all .15s}
.lbtn.on{background:rgba(124,58,237,.4);border-color:var(--purple);color:#c4b5fd}
.hr2{display:flex;align-items:center;gap:6px;padding-bottom:10px;overflow-x:auto;scrollbar-width:none}
.hr2::-webkit-scrollbar{display:none}
.nbtn{white-space:nowrap;padding:6px 14px;border-radius:9px;font-size:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.nbtn.on{background:linear-gradient(135deg,var(--purple),var(--blue));border-color:transparent;color:white;font-weight:700}
main{max-width:900px;margin:0 auto;padding:16px 12px}
/* SEARCH */
.srow{display:flex;gap:8px;margin-bottom:16px}
.si{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(109,40,217,.3);border-radius:12px;padding:11px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--purple)}
.sbtn{background:linear-gradient(135deg,var(--purple),var(--blue));border:none;border-radius:12px;padding:11px 18px;color:white;font-size:15px;cursor:pointer;font-weight:700;flex-shrink:0}
.xbtn{background:rgba(255,71,87,.15);border:1px solid rgba(255,71,87,.3);border-radius:12px;padding:11px 13px;color:#ff6b7a;cursor:pointer;font-size:13px;display:none;flex-shrink:0}
/* TABS */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:8px 16px;border-radius:20px;font-size:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.tab.on{background:linear-gradient(135deg,var(--purple),var(--blue));border-color:transparent;color:white;font-weight:700}
/* CARDS */
.grid{display:flex;flex-direction:column;gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fadeUp .3s ease both;transition:transform .22s,box-shadow .22s;cursor:pointer}
.card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(109,40,217,.2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.card-thumb{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#1e1b4b,#0f172a);display:flex;align-items:center;justify-content:center;font-size:48px;border-bottom:1px solid var(--border)}
.card-body{padding:14px}
.card-meta{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid}
.badge.high{background:rgba(255,71,87,.12);color:#ff6b7a;border-color:rgba(255,71,87,.3)}
.badge.medium{background:rgba(251,191,36,.1);color:#fbbf24;border-color:rgba(251,191,36,.3)}
.badge.low{background:rgba(34,197,94,.1);color:#4ade80;border-color:rgba(34,197,94,.3)}
.badge.free{background:rgba(34,197,94,.12);color:#4ade80;border-color:rgba(34,197,94,.3)}
.badge.paid{background:rgba(251,191,36,.1);color:#fbbf24;border-color:rgba(251,191,36,.3)}
.badge.both{background:rgba(124,58,237,.12);color:#a78bfa;border-color:rgba(124,58,237,.3)}
.msrc{color:var(--dim);font-size:11px}
.mdate{color:var(--dim);font-size:11px}
.card-title{font-size:15px;font-weight:700;line-height:1.4;color:#f1f5f9;margin-bottom:8px;font-family:'Syne',sans-serif}
.card-sum{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:12px}
.card-acts{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.abtn{padding:5px 11px;border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:var(--muted);transition:all .15s}

.abtn.spk{background:rgba(59,130,246,.25);border-color:#3b82f6;color:#93c5fd}
.abtn.svd{background:rgba(124,58,237,.25);border-color:var(--purple);color:#c4b5fd}
.rlink{margin-left:auto;font-size:11px;color:#6366f1;text-decoration:none;font-weight:500}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#0d1117;border:1px solid rgba(124,58,237,.3);border-radius:20px 20px 0 0;width:100%;max-width:860px;max-height:88vh;overflow-y:auto;padding:24px 18px 40px}
.modal-close{float:right;background:rgba(255,255,255,.08);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:800;color:#f1f5f9;margin-bottom:12px;font-family:'Syne',sans-serif;line-height:1.4}
.modal-body{color:var(--muted);font-size:14px;line-height:1.7}
.modal-link{display:inline-block;margin-top:16px;background:linear-gradient(135deg,var(--purple),var(--blue));color:white;padding:10px 20px;border-radius:10px;text-decoration:none;font-weight:700;font-size:13px}
/* COMPARISON TABLE */
.comp-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.comp-table th{background:rgba(124,58,237,.2);color:var(--accent);padding:8px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.1)}
.comp-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05);color:var(--muted);vertical-align:top}
.comp-table tr:hover td{background:rgba(255,255,255,.03)}
.win{color:#4ade80;font-weight:700}
/* STAR RATING */
.stars{color:#fbbf24;font-size:13px}
/* EMPTY */
.empty{text-align:center;padding:60px 0;color:#374151}
/* SETTINGS MODAL */
.settings-modal{background:#0d1117;border:1px solid rgba(124,58,237,.3);border-radius:20px 20px 0 0;width:100%;max-width:860px;padding:24px 18px 40px}
.credit-box{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(37,99,235,.15));border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:20px;text-align:center;margin-top:16px}

.credit-desc{font-size:12px;color:var(--dim);margin-top:8px;line-height:1.6}
footer{text-align:center;padding:32px 0 14px;color:#1f2937;font-size:11px}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let lang="om", tab="news", sq="", sv=[], spkId=null;
try{sv=JSON.parse(localStorage.getItem("aoro_sv")||"[]");}catch{}

const ALL_DATA = {
  news: NEWS,
  models: MODELS,
  video: VIDEO,
  image: IMAGES,
  text: TEXT_AI,
};

// ══════════════════════════════════════
// BUILD UI
// ══════════════════════════════════════
function init(){buildLang();buildNav();showTab("news");}

function buildLang(){
  document.getElementById("lbar").innerHTML = LANGS.map(l=>
    `<button class="lbtn ${l.code===lang?"on":""}" onclick="setLang('${l.code}')">${l.label}</button>`
  ).join("");
}

function setLang(c){
  lang=c;
  document.body.classList.toggle("rtl",c==="ar");
  buildLang();
  render();
}

function buildNav(){
  document.getElementById("navbar").innerHTML = TABS.map(t=>
    `<button class="nbtn ${t.id===tab?"on":""}" onclick="showTab('${t.id}')">${t.label}</button>`
  ).join("");
}

function showTab(t){
  tab=t;
  sq="";
  document.getElementById("sinp").value="";
  document.getElementById("xbtn").style.display="none";
  buildNav();
  // show/hide search
  const showSearch = ["news","models","video","image","text","saved"].includes(t);
  document.getElementById("search-area").style.display = showSearch ? "block" : "none";
  if(t==="settings"){renderSettings();}
  else{render();}
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render(){
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  let data;
  if(tab==="saved") data=sv;
  else data=ALL_DATA[tab]||[];

  // search filter
  if(sq){
    const q=sq.toLowerCase();
    data=data.filter(d=>d.title.toLowerCase().includes(q)||d.summary.toLowerCase().includes(q));
  }

  if(data.length===0){
    grid.innerHTML="";
    empty.style.display="block";
    document.getElementById("empty-msg").textContent = tab==="saved" ? "Kuusameen hin jiru 🔖" : "Waan barbaadde hin argamne";
    return;
  }
  empty.style.display="none";

  grid.innerHTML = data.map((d,i)=>{
    const isSv = sv.find(x=>x.id===d.id);
    const isSpk = spkId===d.id;
    return `
    <div class="card" style="animation-delay:${Math.min(i,6)*.06}s" onclick="openDetail('${d.id}')">
      <div class="card-thumb" style="background:linear-gradient(135deg,${thumbBg(d.icon)})">
        <span style="font-size:52px">${d.icon}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="badge ${d.impact}">${impE(d.impact)}</span>
          <span class="msrc">📰 ${esc(d.source)}</span>
          <span class="mdate">📅 ${d.date}</span>
        </div>
        <h3 class="card-title">${esc(d.title)}</h3>
        <p class="card-sum">${esc(d.summary.slice(0,130))}...</p>
        <div class="card-acts" onclick="event.stopPropagation()">
          <button class="abtn ${isSpk?"spk":""}" onclick="spk('${d.id}','${escA(d.title+'. '+d.summary)}')">${isSpk?"⏹ Dhaabi":"🔊 Dhaggeeffadhu"}</button>
          <button class="abtn ${isSv?"svd":""}" onclick="toggleSv('${d.id}')">${isSv?"🔖 Kuusamee":"📌 Kuusi"}</button>
          ${d.url?`<a class="rlink" href="${escA(d.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Caalaatti →</a>`:""}
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderSettings(){
  document.getElementById("grid").innerHTML=`
  <div style="padding:8px 0">
    <div style="font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:16px;font-family:'Syne',sans-serif">⚙️ Settings & Credit</div>

    <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px">🌍 Afaan Filadhu</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${LANGS.map(l=>`<button class="lbtn ${l.code===lang?"on":""}" onclick="setLang('${l.code}');renderSettings()">${l.label}</button>`).join("")}
      </div>
    </div>

    <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px">📊 Waa'ee App</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.7">
        📅 Haaromfame: June 10, 2026<br>
        📰 Oduu: ${NEWS.length} oduu dhugaa<br>
        🤖 AI Models: ${MODELS.length} madaala<br>
        🎬 Video AI: ${VIDEO.length} tarree<br>
        🖼️ Suuraa AI: ${IMAGES.length} tarree<br>
        ✍️ Barreeffama: ${TEXT_AI.length} tarree<br>
        🔖 Kuusamee: ${sv.length} oduu
      </div>
    </div>

    <div class="credit-box">
      <div style="font-size:40px;margin-bottom:8px">👨‍💻</div>
      <div class="credit-name">Musab Anes</div>
      <div class="credit-title">Uumaa fi Abbaa — Ai Oro Tech News</div>
      <div class="credit-desc">
        App kana Musab Anes uume — Afaan Oromoo fi Ethiopia keessatti AI odeeffannoo namootaaf kennuuf.<br><br>
        🧠 Powered by Claude AI · Anthropic<br>
        🌐 Deployed on Cloudflare Workers<br>
        📅 Version 2.0 — June 2026
      </div>
    </div>

    <div style="margin-top:12px;text-align:center">
      <button onclick="sv=[];try{localStorage.removeItem('aoro_sv');}catch{}render();showTab('news')" style="background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:#ff6b7a;padding:8px 16px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:12px">
        🗑️ Kuusamee Hunda Haqi
      </button>
    </div>
  </div>`;
  document.getElementById("empty").style.display="none";
}

// ══════════════════════════════════════
// DETAIL MODAL
// ══════════════════════════════════════
function openDetail(id){
  const all=[...NEWS,...MODELS,...VIDEO,...IMAGES,...TEXT_AI,...sv];
  const d=all.find(x=>x.id===id);
  if(!d)return;
  document.getElementById("modal-content").innerHTML=`
    <div style="font-size:36px;text-align:center;margin-bottom:12px">${d.icon}</div>
    <div class="modal-title">${esc(d.title)}</div>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      <span class="badge ${d.impact}">${impE(d.impact)}</span>
      <span class="msrc">📰 ${esc(d.source)}</span>
      <span class="mdate">📅 ${d.date}</span>
    </div>
    <div class="modal-body">${d.detail||esc(d.summary)}</div>
    ${d.url?`<a class="modal-link" href="${escA(d.url)}" target="_blank" rel="noopener">🔗 Madda Ilaali →</a>`:""}
  `;
  document.getElementById("modal-bg").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal(e){if(e.target===document.getElementById("modal-bg"))closeModalDirect();}
function closeModalDirect(){
  document.getElementById("modal-bg").classList.remove("open");
  document.body.style.overflow="";
}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
function doSearch(){
  sq=document.getElementById("sinp").value.trim();
  document.getElementById("xbtn").style.display=sq?"flex":"none";
  render();
}
function clearSearch(){
  sq="";
  document.getElementById("sinp").value="";
  document.getElementById("xbtn").style.display="none";
  render();
}
function toggleSv(id){
  const all=[...NEWS,...MODELS,...VIDEO,...IMAGES,...TEXT_AI];
  const d=all.find(x=>x.id===id);
  if(!d)return;
  const idx=sv.findIndex(x=>x.id===id);
  if(idx>=0)sv.splice(idx,1);else sv.unshift(d);
  try{localStorage.setItem("aoro_sv",JSON.stringify(sv));}catch{}
  buildNav();render();
}
function spk(id,text){
  window.speechSynthesis.cancel();
  if(spkId===id){spkId=null;render();return;}
  const u=new SpeechSynthesisUtterance(text);
  const vs=window.speechSynthesis.getVoices();
  const lm={om:"en",am:"am",ti:"ti",so:"so",ar:"ar",en:"en"};
  const v=vs.find(x=>x.lang.startsWith(lm[lang]||"en"))||vs[0];
  if(v)u.voice=v;u.rate=0.9;
  u.onend=u.onerror=()=>{spkId=null;render();};
  window.speechSynthesis.speak(u);
  spkId=id;render();
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escA(s){return(s||"").replace(/'/g,"&#39;").replace(/\n/g," ").slice(0,200);}
function impE(i){return{high:"🔥 HIGH",medium:"⚡ MED",low:"✅ LOW"}[i]||"📌";}
function thumbBg(icon){
  const map={"🤖":"#1e1b4b,#312e81","📱":"#0f172a,#1e3a5f","💼":"#1a0a2e,#2d1b69","🚗":"#0a1628,#1e3a5f","💻":"#0f1923,#1a3a2e","🔒":"#1a0000,#3a0000","🎬":"#0a0a1e,#1a0a3e","🖼️":"#0a1e0a,#0a2e1a","✍️":"#1e0a0a,#2e1a0a","🟣":"#1e0a3e,#0a1e3e","💰":"#1e1a00,#2e2a00"};
  return map[icon]||"#06060f,#0d1117";
}

window.onload=init;
</script>
